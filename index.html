<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=375, initial-scale=1.0" />
<title>太陽早餐店 菜單</title>
<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --brand: #B22222;
    --brand-light: #f9eded;
    --brand-mid: #d94444;
    --text-dark: #1a1a1a;
    --text-mid: #555;
    --text-light: #888;
    --bg: #fff;
    --card-bg: #fff;
    --border: #eee;
    --radius: 14px;
    --font: 'Noto Sans TC', 'Noto Sans JP', 'Noto Sans KR', sans-serif;
  }

  html, body {
    background: var(--bg);
    color: var(--text-dark);
    font-family: var(--font);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    max-width: 375px;
    margin: 0 auto;
    min-height: 100vh;
  }

  /* ── Google Fonts ── */
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap');

  /* ── Language Bar ── */
  #lang-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--brand);
    display: flex;
    justify-content: center;
    gap: 0;
    padding: 0;
    box-shadow: 0 2px 8px rgba(178,34,34,0.18);
  }
  .lang-btn {
    flex: 1;
    background: none;
    border: none;
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    font-weight: 500;
    padding: 11px 4px;
    cursor: pointer;
    transition: color 0.15s, background 0.15s;
    letter-spacing: 0.02em;
  }
  .lang-btn.active {
    color: #fff;
    background: rgba(255,255,255,0.15);
    font-weight: 700;
  }

  /* ── Hero ── */
  #hero {
    background: var(--brand);
    color: #fff;
    text-align: center;
    padding: 32px 20px 24px;
    position: relative;
    overflow: hidden;
  }
  #hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 60% 20%, rgba(255,200,80,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-img-wrap {
    width: 100%;
    height: 160px;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 18px;
    background: rgba(255,255,255,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .hero-placeholder {
    font-size: 72px;
    line-height: 1;
    opacity: 0.85;
  }
  .store-name {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-shadow: 0 1px 4px rgba(0,0,0,0.18);
    margin-bottom: 10px;
  }
  .store-info {
    font-size: 13px;
    opacity: 0.88;
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: center;
  }
  .store-info a {
    color: #fff;
    text-decoration: none;
  }
  .info-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .info-icon { font-size: 14px; }

  /* ── Category Tab Bar ── */
  #cat-bar {
    position: sticky;
    top: 43px;
    z-index: 90;
    background: #fff;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
    display: flex;
    gap: 0;
    padding: 0 12px;
  }
  #cat-bar::-webkit-scrollbar { display: none; }
  .cat-tab {
    flex: 0 0 auto;
    background: none;
    border: none;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-mid);
    padding: 12px 12px 10px;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
  }
  .cat-tab.active {
    color: var(--brand);
    border-bottom-color: var(--brand);
    font-weight: 700;
  }

  /* ── Menu Sections ── */
  .menu-section {
    padding: 0 0 8px;
  }
  .section-header {
    padding: 20px 16px 10px;
    font-size: 17px;
    font-weight: 700;
    color: var(--brand);
    letter-spacing: 0.02em;
    border-bottom: 1px solid var(--brand-light);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-header::before {
    content: '';
    display: inline-block;
    width: 4px;
    height: 18px;
    background: var(--brand);
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ── Item Cards ── */
  .item-list {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .item-card {
    display: flex;
    align-items: stretch;
    gap: 0;
    padding: 13px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.12s;
    -webkit-tap-highlight-color: transparent;
  }
  .item-card:active {
    background: var(--brand-light);
  }
  .item-card:last-child {
    border-bottom: none;
  }

  /* emoji / image side */
  .item-thumb {
    width: 72px;
    height: 72px;
    border-radius: 10px;
    overflow: hidden;
    flex-shrink: 0;
    background: var(--brand-light);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 13px;
    font-size: 36px;
    line-height: 1;
  }
  .item-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* text side */
  .item-body {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
  }
  .item-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-dark);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-price-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }
  .price-chip {
    font-size: 13px;
    color: var(--brand);
    font-weight: 600;
  }
  .price-label {
    font-size: 12px;
    color: var(--text-light);
    margin-right: 2px;
  }
  .item-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .tag-badge {
    display: inline-flex;
    align-items: center;
    gap: 2px;
    font-size: 11px;
    background: var(--brand-light);
    color: var(--brand);
    border-radius: 20px;
    padding: 2px 7px;
    font-weight: 500;
  }

  /* ── Modal ── */
  #modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(0,0,0,0.55);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.22s;
  }
  #modal-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }
  #modal {
    background: var(--bg);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 375px;
    max-height: 88vh;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.26s cubic-bezier(0.32, 0.72, 0, 1);
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  #modal-overlay.open #modal {
    transform: translateY(0);
  }
  .modal-img-wrap {
    width: 100%;
    height: 220px;
    background: var(--brand-light);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 20px 20px 0 0;
    overflow: hidden;
    touch-action: pinch-zoom;
    font-size: 96px;
    line-height: 1;
  }
  .modal-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .modal-body {
    padding: 20px 20px 28px;
  }
  .modal-name {
    font-size: 21px;
    font-weight: 700;
    margin-bottom: 12px;
    color: var(--text-dark);
  }
  .modal-prices {
    margin-bottom: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .modal-price-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    background: var(--brand-light);
    border-radius: 8px;
  }
  .modal-price-label {
    font-size: 14px;
    color: var(--text-mid);
  }
  .modal-price-val {
    font-size: 16px;
    font-weight: 700;
    color: var(--brand);
  }
  .modal-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
  }
  .modal-tag-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 12px;
    background: var(--brand-light);
    color: var(--brand);
    border-radius: 20px;
    padding: 4px 10px;
    font-weight: 500;
  }
  .modal-desc, .modal-note {
    font-size: 13px;
    color: var(--text-mid);
    line-height: 1.6;
    margin-top: 8px;
  }
  .modal-note {
    font-style: italic;
    color: var(--text-light);
    border-top: 1px solid var(--border);
    padding-top: 8px;
    margin-top: 8px;
  }
  .modal-close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(0,0,0,0.35);
    border: none;
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    z-index: 10;
  }
  .modal-img-container {
    position: relative;
  }

  /* ── Footer ── */
  #footer {
    text-align: center;
    padding: 24px 16px 40px;
    font-size: 12px;
    color: var(--text-light);
    border-top: 1px solid var(--border);
    line-height: 1.8;
  }

  /* sweetness note */
  #sweetness-note {
    margin: 0 16px 0;
    padding: 10px 14px;
    background: #fffbf0;
    border: 1px solid #ffe4a0;
    border-radius: 10px;
    font-size: 12px;
    color: #7a5a00;
    line-height: 1.7;
  }
</style>
</head>

  { id:'latte-005', category:'latte', names:{zh:'阿華田拿鐵',en:'Ovaltine Latte',ja:'オバルティンラテ',ko:'오발틴 라떼'}, price:[{label:{zh:'中',en:'M',ja:'M',ko:'M'},value:45},{label:{zh:'大',en:'L',ja:'L',ko:'L'},value:65}], image:null, emoji:'🍵', tags:[], desc:{zh:'',en:'',ja:'',ko:''}, note:{zh:'',en:'',ja:'',ko:''} },
  { id:'latte-006', category:'latte', names:{zh:'可可芭薈拿鐵',en:'Cocoa Aloe Latte',ja:'ココアアロエラテ',ko:'코코아 알로에 라떼'}, price:[{label:{zh:'中',en:'M',ja:'M',ko:'M'},value:50},{label:{zh:'大',en:'L',ja:'L',ko:'L'},value:70}], image:null, emoji:'🍵', tags:[], desc:{zh:'',en:'',ja:'',ko:''}, note:{zh:'',en:'',ja:'',ko:''} },
];

// ── State ──────────────────────────────────────────────────────────────────
let currentLang = localStorage.getItem('menu_lang') || 'zh';
let savedScrollY = 0;

// ── Render ────────────────────────────────────────────────────────────────
function t(obj) {
  if (typeof obj === 'string') return obj;
  return obj[currentLang] || obj['zh'] || '';
}

function renderCatBar() {
  const bar = document.getElementById('cat-bar');
  bar.innerHTML = categories.map(cat => `
    <button class="cat-tab" data-cat="${cat.id}" onclick="scrollToSection('${cat.id}')">${t(cat.names)}</button>
  `).join('');
}

function renderMenu() {
  const body = document.getElementById('menu-body');
  body.innerHTML = categories.map(cat => {
    const items = menuItems.filter(i => i.category === cat.id);
    if (!items.length) return '';
    return `
      <div class="menu-section" id="section-${cat.id}" data-screen-label="${t(cat.names)}">
        <div class="section-header">${t(cat.names)}</div>
        <div class="item-list">
          ${items.map(item => renderCard(item)).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function renderCard(item) {
  const thumb = item.image
    ? `<img src="images/${item.image}" alt="${t(item.names)}" loading="lazy" />`
    : `${item.emoji}`;
  const priceHTML = item.price.map(p => {
    const val = p.value === 'market' ? t(i18n.market) : `NT$${p.value}`;
    if (p.label && p.label.zh) {
      return `<span class="price-chip"><span class="price-label">${t(p.label)}</span>${val}</span>`;
    }
    return `<span class="price-chip">${val}</span>`;
  }).join('');
  const tagsHTML = item.tags.map(tag => {
    const td = tagMap[tag];
    if (!td) return '';
    return `<span class="tag-badge">${td.icon} ${td[currentLang]||td.zh}</span>`;
  }).join('');
  return `
    <div class="item-card" onclick="openModal('${item.id}')">
      <div class="item-thumb">${thumb}</div>
      <div class="item-body">
        <div class="item-name">${t(item.names)}</div>
        <div class="item-price-row">${priceHTML}</div>
        ${tagsHTML ? `<div class="item-tags">${tagsHTML}</div>` : ''}
      </div>
    </div>
  `;
}

function renderI18n() {
  document.querySelectorAll('[data-i18n="store_name"]').forEach(el => {
    el.textContent = t(i18n.store_name);
  });
  document.querySelectorAll('[data-i18n="address"]').forEach(el => {
    el.textContent = t(i18n.address);
  });
  const sw = document.getElementById('sweetness-note');
  if (sw) sw.textContent = t(i18n.sweetness);
  const ft = document.getElementById('footer');
  if (ft) ft.innerHTML = t(i18n.footer).replace(/\n/g, '<br>');
  document.title = t(i18n.store_name) + ' 菜單';
}

function updateActiveCatTab() {
  const sections = categories.map(c => document.getElementById('section-' + c.id)).filter(Boolean);
  let current = sections[0];
  const offset = 100;
  sections.forEach(sec => {
    if (sec.getBoundingClientRect().top <= offset) current = sec;
  });
  document.querySelectorAll('.cat-tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.cat === current.id.replace('section-', ''));
  });
}

// ── Lang Switch ───────────────────────────────────────────────────────────
function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('menu_lang', lang);
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });
  renderI18n();
  renderCatBar();
  renderMenu();
}

// ── Cat Scroll ────────────────────────────────────────────────────────────
function scrollToSection(catId) {
  const el = document.getElementById('section-' + catId);
  if (!el) return;
  const offset = document.getElementById('lang-bar').offsetHeight
               + document.getElementById('cat-bar').offsetHeight;
  const top = el.getBoundingClientRect().top + window.scrollY - offset - 4;
  window.scrollTo({ top, behavior: 'smooth' });
}

// ── Modal ─────────────────────────────────────────────────────────────────
function openModal(itemId) {
  const item = menuItems.find(i => i.id === itemId);
  if (!item) return;
  savedScrollY = window.scrollY;

  const imgWrap = document.getElementById('modal-img');
  if (item.image) {
    imgWrap.innerHTML = `<img src="images/${item.image}" alt="${t(item.names)}" />`;
  } else {
    imgWrap.innerHTML = item.emoji;
  }

  document.getElementById('modal-name').textContent = t(item.names);

  const pricesEl = document.getElementById('modal-prices');
  pricesEl.innerHTML = item.price.map(p => {
    const val = p.value === 'market' ? t(i18n.market) : `NT$${p.value}`;
    const label = (p.label && p.label.zh) ? t(p.label) : '';
    return `
      <div class="modal-price-row">
        <span class="modal-price-label">${label || '─'}</span>
        <span class="modal-price-val">${val}</span>
      </div>
    `;
  }).join('');

  const tagsEl = document.getElementById('modal-tags');
  tagsEl.innerHTML = item.tags.map(tag => {
    const td = tagMap[tag];
    if (!td) return '';
    return `<span class="modal-tag-badge">${td.icon} ${td[currentLang]||td.zh}</span>`;
  }).join('');

  const desc = t(item.desc);
  const note = t(item.note);
  const descEl = document.getElementById('modal-desc');
  const noteEl = document.getElementById('modal-note');
  descEl.textContent = desc;
  descEl.style.display = desc ? '' : 'none';
  noteEl.textContent = note;
  noteEl.style.display = note ? '' : 'none';

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) {
    closeModalDirect();
  }
}

function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
  window.scrollTo({ top: savedScrollY, behavior: 'instant' });
}

// ── Init ──────────────────────────────────────────────────────────────────
function init() {
  renderI18n();
  renderCatBar();
  renderMenu();
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === currentLang);
  });
  window.addEventListener('scroll', updateActiveCatTab, { passive: true });
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
